<!DOCTYPE html>
<html lang="en">
<head>

    <title>The Waiting Room - Sound Design</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="main.js"></script>
</head>
<body>
    <h1>The Waiting Room</h1>
    <div class="controller">
        <pad id="heaven" class="cyan">☁️</pad>
        <pad id="comedy" class="yellow">🎪</pad>
        <pad id="truck" class="green">🚚</pad>
        <pad id="bike" class="purple">🛵</pad>
        <pad id="traffic" class="blue" style="font-size:8vw">🚲🚗🚚</pad>
        <pad id="blink" class="orange">✨</pad>
        <pad id="song" class="magenta">🎵</pad>
        <pad id="introspection" class="cyan">⚖️</pad>
    </div>
    <button id="btn-fs" class="btn-fs">⛶</button>
