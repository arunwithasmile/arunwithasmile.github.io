<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:o="urn:schemas-microsoft-com:office:office">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="x-apple-disable-message-reformatting">
    <link rel="shortcut icon" href="https://onsign.tv/media/apple-logo.png">
    <title>CSS iPhone</title>
    <style type="text/css">
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        a[x-apple-data-detectors] {
            color: inherit !important;
        }

        a {
            text-decoration: none;
            color: unset;
        }

        * {
            -moz-box-sizing: border-box;
            -webkit-box-sizing: border-box;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: none;
            text-size-adjust: none;
        }

        .phone {
            position: relative;
            width: 330px;
            height: 700px;
            border-radius: 60px;
            border: 4px solid #544464;
            margin: 25px auto;
            background-color: #c0b0de;
            box-shadow: 0 0 1px #000;
        }

        wallpaper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #cca4ff, #334dfd);
            overflow: hidden;
            border-radius: 56px;
            transition: filter 1s;
        }

        wallpaper .ball {
            width: 172%;
            height: 88%;
            background: linear-gradient(to bottom, #663bc2, #0b2cff);
            border-radius: 50%;
            position: absolute;
            left: -35.5%;
            top: 9%;
            box-shadow: -60px 20px 100px 10px #ffffff inset, 0 40px 250px rgb(0 0 0 / 70%);
        }

        wallpaper>.ball>.ball {
            height: 67%;
            width: 74%;
            left: 1%;
            top: 14%;
            box-shadow: -40px 0 100px rgb(233 239 255 / 75%) inset, 0 0 250px rgb(0 0 0 / 50%);
        }

        wallpaper>.ball>.ball>.ball {
            height: 58.8%;
            width: 58.8%;
            left: 37%;
            top: 20%;
            box-shadow: -30px 0 70px #fff inset, 0 0 50px rgb(0 0 0 / 50%);
        }

        #toggle:not(:checked)~wallpaper {
            filter: brightness(0.6);
        }

        .bezel {
            position: absolute;
            border: 7px solid #333;
            border-radius: 56px;
            height: 100%;
            width: 100%;
            padding: 11px;
            box-shadow: -0.5px 0px 3px 2px #fbf2ff;
        }

        .notch {
            display: flex;
            align-items: center;
            justify-content: end;
            padding-inline: 7px;
            background-color: #111;
            height: 28px;
            width: 96px;
            margin: auto;
            border-radius: 20px;

            .camera {
                height: 15px;
                aspect-ratio: 1;
                border-radius: 50%;
                background-color: #222;
                padding: 4px;

                .lens {
                    height: 100%;
                    width: 100%;
                    border-radius: 50%;
                    background: #222;
                    box-shadow: -1px 1px 2px #124021 inset;
                    text-align: left;
                    padding: 3px 0 0 2px;

                    .flare {
                        background: rgb(90 60 89);
                        height: 3px;
                        width: 2px;
                        border-radius: 50%;
                        transform: rotate(-20deg);
                        -webkit-transform: rotate(-20deg);
                    }
                }
            }
        }

        .sys-date-time {
            margin-block: 3rem 2rem;

            .date {
                text-align: center;
                font-weight: bold;
                opacity: 1;
            }
            .time {
                display: flex;
                align-items: center;
                font-size: 4rem;
                font-weight: bold;
                width: fit-content;
                margin: auto;
                opacity: 0.75;
            }
        }

        @keyframes blinker {
            50% {
                opacity: 0;
            }
        }

        .blinker {
            animation: blinker 2s step-start infinite;

            &::before,
            &::after {
                content: "";
                display: block;
                height: 9px;
                aspect-ratio: 1;
                background: currentColor;
                margin: 8px 4px;
                border-radius: 50%;
            }
        }

        .wifi-battery {
            position: absolute;
            right: 10px;
            top: 11px;
            height: 28px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .wifi {
            display: inline-block;
            height: 22px;
            aspect-ratio: 1;
            translate: 0 25%;
        }

        .wifi,
        .wifi-inner {
            border: 6px double transparent;
            border-top-color: currentColor;
            border-radius: 50%;
        }

        .wifi-inner {
            position: relative;
            border-width: 3px;
            border-style: solid;
            height: 6px;
            width: 6px;
            display: block;
            margin: 2px;
        }

        .battery {
            width: 40px;
            height: 22px;
            border: 2px solid #fff8;
            border-radius: 6px;
            padding: 2px;
            transform: scale(0.5);
            transform-origin: 0;
        }

        .battery .charge {
            background: currentColor;
            height: 100%;
            width: 84%;
            border-radius: 3px 1.5px 1.5px 3px;
        }

        .cap {
            background: #fff8;
            height: 6px;
            width: 2px;
            border-radius: 0 4px 4px 0;
            position: absolute;
            top: calc(50% - 3px);
            right: -14%;
        }

        .speaker {
            position: absolute;
            top: -7px;
            left: 120px;
            width: 67px;
            height: 3px;
            border-radius: 0 0 3px 3px;
            background-color: #000;
            border-bottom: 1px dotted #555;
        }

        .home-btn {
            width: 123px;
            height: 6px;
            background: #fff4;
            border-radius: 5px;
            margin: auto;
            backdrop-filter: blur(2px);
            transition: background 1s;
            position: absolute;
            translate: calc(50% + 30px);
            bottom: 1rem;
        }

        #toggle:not(:checked)~.bezel .home-btn {
            background: #fffa;
        }

        /* ##############################
        *  NOTIFICATION
        * ##############################*/

        .notification {
            display: flex;
            align-items: center;
            box-shadow: 0px 0px 2px rgba(0, 0, 0, 30%), -1px -1px 1px #fff6, 1px 0 1px #fff;
            margin: 10px 5px 3px;
            border-radius: 25px;
            font-size: 12px;
            height: 182px;
            cursor: pointer;
            transition: height 0.3s, margin-top 0.5s, background-color 0.3s, scale 0.3s;
            backdrop-filter: blur(5px);
        }

        /*
  *  This part is only for clients that support :psuedo elements
  *  This part is beautiful!
  */

        #toggle {
            position: absolute;
            opacity: 0;
            top: 50%;
        }

        label.fullscreen {
            position: absolute;
        }
        
        #toggle:not(:checked)~.bezel label.fullscreen {
            inset: 0;
        }

        #toggle:checked~.bezel .notification {
            height: 115px;
            background: rgba(255, 255, 255, 12%);
            line-height: 14px;

            .icon {
                background: linear-gradient(#a5c8e254, #0059d959);
            }
        }

        #toggle:checked~.bezel .notification:hover {
            scale: 1.01;
        }

        #toggle:not(:checked)~.bezel .notification {
            margin-top: 69px;
            background: rgba(255, 255, 255, 90%);
            color: #222;
            box-shadow: 0px 0px 2px rgba(0, 0, 0, 30%);
        }

        .notification .info-header {
            display: flex;
            justify-content: space-between;
            padding: 14px 14px 5px 2px;
            position: relative;
        }

        .notification .content {
            margin-inline: 12px 14px;
            height: calc(100% - 47px);
            overflow: hidden;
        }

        .notification .icon {
            background: linear-gradient(#3098e4, #0d4eac);
            border-radius: 12px;
            position: relative;
            height: 42px;
            aspect-ratio: 1;
            margin-left: 10px;
        }

        .notification .cloud {
            display: inline-block;
            position: absolute;
            left: 6px;
            bottom: 10px;
            border-radius: 10px;
            height: 32%;
            width: 69%;
            background-color: #fff;
            opacity: 0.7;
        }

        .cloud:after,
        .cloud:before {
            content: '';
            position: absolute;
            border-radius: 100%;
            aspect-ratio: 1;
            background-color: #fff;
        }

        .cloud:before {
            height: 108%;
            left: 9px;
            top: -9px;
        }

        .cloud:after {
            height: 118%;
            right: -1px;
            top: -3px;
        }

        .sun {
            position: absolute;
            top: 19%;
            right: 14%;
            width: 34%;
            aspect-ratio: 1;
            border-radius: 50%;
            background-color: #facf4c;
        }

        .notification .body {
            height: 100%;
        }

        .notification .title {
            font-weight: bold;
            letter-spacing: 0;
        }

        .notification .app-name {
            display: inline-block;
            padding: 0 8px;
            opacity: 0.65;
        }

        .notification .time {
            opacity: 0.65;
        }

        .notification .close {
            position: absolute;
            top: -35px;
            right: 15px;
            width: 30px;
            height: 30px;
            font-size: 25px;
            opacity: 0;
            border-radius: 50%;
            background: rgb(255 255 255);
            backdrop-filter: blur(5px);
            box-shadow: 0px 0px 2px rgb(0 0 0 / 30%);
            font-family: monospace;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #toggle:not(:checked)~.bezel .notification .close {
            opacity: 0.6;
            transition: opacity 1.1s ease 0.65s;
        }

        .notification .text {
            margin-top: 4px;
            height: calc(100% - 10px);
            line-height: 17px;
        }

        buttons {
            display: block;
            width: 90%;
            margin: auto;
            overflow: hidden;
            transition: height 0.6s;
        }

        #toggle:checked~.bezel buttons {
            height: 0;
        }

        .button {
            margin: 0 5px;
            background-color: rgb(255 255 255 / 40%);
            box-shadow: 0px 0px 2px rgb(0 0 0 / 30%);
            backdrop-filter: blur(5px);
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 1px;
            display: grid;
            place-items: center;
            height: 40px;
            transition: background-color 0.2s, height 0.4s ease 0.25s;

            &:first-child {
                border-radius: 20px 20px 0 0;
            }

            &:last-child {
                border-radius: 0 0 20px 20px;
            }
        }

        .button:hover {
            background-color: rgb(255 255 255 / 45%);
        }

        #toggle:checked~.bezel .button {
            transition: height 0.4s;
            height: 0;
            opacity: 0;
        }

        .heading-underline {
            position: relative;
        }

        .heading-underline:before {
            content: "";
            background-color: orange;
            display: block;
            width: 30px;
            height: 4px;
            position: absolute;
            top: 30px;
        }

        .with-tip {
            position: relative;
        }

        .tip {
            position: absolute;
            background: #333;
            color: #fff;
            font-size: 13px;
            text-align: center;
            top: 35px;
            padding: 4px 8px;
            border-radius: 3px;
            display: none;
        }

        .with-tip:hover>.tip {
            display: block !important;
        }

        img.ref {
            position: absolute;
            top: -594px;
            scale: 0.2045;
            left: -302px;
            opacity: 0.2;
        }
    </style>
</head>

<body>
    <div class="phone">
        <!-- This is the Open/Close switch -->
        <input type="checkbox" checked id="toggle">
        <wallpaper>
            <div class="ball">
                <div class="ball">
                    <div class="ball"></div>
                </div>
            </div>
        </wallpaper>
        <div class="bezel">
            <label for="toggle" class="fullscreen"></label>
            <div class="speaker"></div>
            <div class="notch">
                <div class="camera">
                    <div class="lens">
                        <div class="flare"></div>
                    </div>
                </div>
            </div>
            <div class="wifi-battery">
                <div class="wifi">
                    <div class="wifi-inner"></div>
                </div>
                <div class="battery">
                    <div class="charge"></div>
                    <div class="cap"></div>
                </div>
            </div>
            <div class="sys-date-time">
                <div class="date">Wed 29 June</div>
                <div class="time">16<span class="blinker"></span>43</div>
            </div>
            <label class="notification" for="toggle">
                <span class="icon">
                    <div class="sun"></div>
                    <span class="cloud"></span>
                </span>
                <div class="body">
                    <div class="info-header">
                        <span class="app-name">CSS Phone</span>
                        <span class="time">now</span>
                        <span class="close">×</span>
                    </div>
                    <div class="content">
                        <div class="title">Welcome to CSS Phone</div>
                        <div class="text">&#128587;&#8205;&#9794;&#65039; Hey! So cool you clicked to check this out. This phone
                            is made with HTML and CSS only. Seriously no images, no Javascript! Expand and collapse of this notification is achieved using a simple
                            checkbox. Pretty fun right? &#128526;
                        </div>
                    </div>
                </div>
            </label>
            <buttons>
                <a class="button" href="mailto:arunwithasmile@gmail.com?subject=Nice to Meet You&body=Hi Arun.">Reply</a>
                <a class="button" href="http://linkedin.com/in/arun-pujari">Connect</a>
            </buttons>
            <div class="home-btn"></div>
        </div>
    </div>
<!-- <img src="images/iphone-ref.png" class="ref"> -->
</body>

</html>
