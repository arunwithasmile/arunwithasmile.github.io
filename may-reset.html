<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
    }

    main {
        position: relative;
        width: 400px;
        margin: auto;
    }

    img,
    overlay {
        width: 100%;
    }

    overlay {
        position: absolute;
        inset: 0;
        padding: 81px 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
    }

    card {
        display: block;
        width: 48px;
        height: 57px;
        border-radius: 2px;
        position: relative;

        &::before,
        &::after {
            content: '';
            position: absolute;
            display: block;
            width: 15px;
            aspect-ratio: 1;
            border-radius: 50%;
        }
    }

    card[data-completed='true'] {
        border: 4px solid green;

        &::before {
            width: 18px;
            background-color: #B4DF8D;
            top: -9px;
            right: -9px;
        }

        &::after {
            content: '✓';
            color: green;
            top: -7px;
            right: -10px;
            font-size: 12px;
        }
    }

    /* Adjustments */
    card:nth-of-type(8),
    card:nth-of-type(14),
    card:nth-of-type(15),
    card:nth-of-type(17),
    card:nth-of-type(20),
    card:nth-of-type(21),
    card:nth-of-type(22),
    card:nth-of-type(23),
    card:nth-of-type(27),
    card:nth-of-type(28) {
        translate: 2px;
    }

    card:nth-of-type(26),
    card:nth-of-type(29) {
        translate: 3px;
    }

    card:nth-of-type(11),
    card:nth-of-type(16),
    card:nth-of-type(30) {
        translate: 1px;
    }

    card:nth-of-type(31) {
        translate: 1px -4px;
    }
</style>

<body>
    <main>
        <img src="images/may-reset.webp" alt="">
        <overlay>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
            <card></card>
        </overlay>
    </main>
</body>
<script>
    function setupCardCompletionEvents() {
        document.querySelectorAll('card').forEach((card, index) => {
            card.addEventListener('click', () => {
                if (card.dataset.completed === 'true') {
                    card.dataset.completed = 'false';
                    const completedCards = localStorage.getItem('completedCards')?.split(',') || [];
                    const updatedCards = completedCards.filter(i => i !== index.toString());
                    localStorage.setItem('completedCards', updatedCards.join(','));
                } else {
                    card.dataset.completed = 'true';
                    const completedCards = localStorage.getItem('completedCards')?.split(',') || [];
                    completedCards.push(index);
                    localStorage.setItem('completedCards', completedCards.join(','));
                }
            });
        });
    }

    function markCompleteCards() {
        const cards = localStorage.getItem('completedCards')?.split(',') || [];
        cards.forEach(index => {
            const card = document.querySelector(`card:nth-of-type(${index + 1})`);
            card.dataset.completed = 'true';
        });
    }
    setupCardCompletionEvents();
    markCompleteCards();
</script>

</html>
